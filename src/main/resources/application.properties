spring.web.resources.add-mappings=true
server.port=8080
app.name=SolidSign-Example-XML-PKCS1
app.version=1.0.0

# [EN]    Base URL of the SolidSign API (without path)
# [PT-BR] URL base da API SolidSign (sem o caminho)
# [ES]    URL base de la API SolidSign (sin la ruta)
solidsign.api.base-url=https://solidsign.com.br

# [EN]    Authorization header value — include "Bearer " prefix
# [PT-BR] Valor do header Authorization — inclua o prefixo "Bearer "
# [ES]    Valor del header Authorization — incluya el prefijo "Bearer "
solidsign.api.authorization=Bearer YOUR_JWT_TOKEN_HERE

# [EN]    PEM-encoded public certificate of the signer — NO BEGIN/END CERTIFICATE headers required.
#         The private key never leaves the client device (eToken A3 or OS certificate store).
#         Paste only the Base64 body of the certificate here.
# [PT-BR] Certificado público do assinante codificado em PEM — SEM os marcadores BEGIN/END CERTIFICATE.
#         A chave privada nunca sai do dispositivo do cliente (eToken A3 ou repositório de certificados).
#         Cole aqui apenas o corpo Base64 do certificado.
# [ES]    Certificado público del firmante codificado en PEM — SIN los marcadores BEGIN/END CERTIFICATE.
#         La clave privada nunca sale del dispositivo del cliente (eToken A3 o almacén de certificados).
#         Pegue aquí solo el cuerpo Base64 del certificado.
solidsign.cert.pem=MIICp...YOUR_CERT_PEM...

# [EN]    Hash algorithm for the signature (SHA256, SHA384, SHA512)
# [PT-BR] Algoritmo de hash para a assinatura (SHA256, SHA384, SHA512)
# [ES]    Algoritmo de hash para la firma (SHA256, SHA384, SHA512)
solidsign.sig.hashAlgorithm=SHA256

# [EN]    Signature profile: ADRB, ADRT, ADRC, ADRA, PDF_BASIC, PDF_TIMESTAMP, PDF_COMPLETE, PADES_B, PADES_T, PADES_LT, PADES_LTA
# [PT-BR] Perfil de assinatura: ADRB, ADRT, ADRC, ADRA, PDF_BASIC, PDF_TIMESTAMP, PDF_COMPLETE, PADES_B, PADES_T, PADES_LT, PADES_LTA
# [ES]    Perfil de firma: ADRB, ADRT, ADRC, ADRA, PDF_BASIC, PDF_TIMESTAMP, PDF_COMPLETE, PADES_B, PADES_T, PADES_LT, PADES_LTA
solidsign.sig.profile=ADRB

# [EN]    Signature packaging for XML: ENVELOPED, ENVELOPING, DETACHED
# [PT-BR] Empacotamento da assinatura para XML: ENVELOPED, ENVELOPING, DETACHED
# [ES]    Empaquetado de la firma para XML: ENVELOPED, ENVELOPING, DETACHED
solidsign.sig.signaturePackaging=ENVELOPED

# [EN]    Local name of the XML node that will be signed
# [PT-BR] Nome local do nó XML que será assinado
# [ES]    Nombre local del nodo XML que será firmado
solidsign.sig.signatureNodeName=document

# [EN]    Namespace URI of the XML node to be signed
# [PT-BR] URI do namespace do nó XML a ser assinado
# [ES]    URI del namespace del nodo XML a firmar
solidsign.sig.signatureNodeNamespace=http://www.example.com/doc

# [EN]    XML canonicalization algorithm URI
# [PT-BR] URI do algoritmo de canonicalização XML
# [ES]    URI del algoritmo de canonicalización XML
solidsign.sig.canonicalizationMethod=http://www.w3.org/TR/2001/REC-xml-c14n-20010315
